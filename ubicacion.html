<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ubicación | Kennel Club Santa Fe</title>

  <meta
    name="description"
    content="Ubicación del Kennel Club Santa Fe en Pedro Vittori 4330, Santa Fe de la Vera Cruz."
  />

  <link
    rel="icon"
    type="image/png"
    href="https://github.com/MatiasH2804/Kennel-Club-Santa-Fe-Web/blob/main/logo%20kennel.png?raw=true"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="ubicacion-page">

  <div class="wrapper">

    <section class="location-card">

      <div>

        <p class="eyebrow">
          Ubicación
        </p>

        <h1>
          Visitá el Kennel Club Santa Fe
        </h1>

        <p>
          Pedro Vittori 4330, S3002 Santa Fe de la Vera Cruz, Santa Fe.
        </p>

        <p>
          Cursos de adiestramiento, actividades oficiales, exposiciones y encuentros caninos.
        </p>

      </div>

      <a
        href="https://maps.google.com/?q=Pedro+Vittori+4330+Santa+Fe"
        target="_blank"
        class="map-btn-wrapper"
      >

        <svg height="0" width="0">

          <filter id="land">

            <feTurbulence
              result="turb"
              numOctaves="7"
              baseFrequency="0.006"
              type="fractalNoise"
            ></feTurbulence>

            <feDisplacementMap
              yChannelSelector="G"
              xChannelSelector="R"
              scale="700"
              in="SourceGraphic"
              in2="turb"
            ></feDisplacementMap>

          </filter>

        </svg>

        <div class="map-btn">
          Pedro Vittori 4330
        </div>

        <div class="pinpoint"></div>

        <div class="map-container">

          <div class="map fold-1"></div>
          <div class="map fold-2"></div>
          <div class="map fold-3"></div>
          <div class="map fold-4"></div>

        </div>

      </a>

    </section>

    <!-- GOOGLE MAPS -->

    <section class="maps-frame">

      <iframe
        src="https://www.google.com/maps?q=Pedro+Vittori+4330+Santa+Fe&output=embed"
        loading="lazy">
      </iframe>

    </section>

  </div>

</body>
</html>
